<!doctype html>
<html lang="tr" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeftunTech Links</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap"
    />
    <style>
      * {
        font-family: "Fira Sans", sans-serif;
      }
      body {
        background-color: #102030;
        font-weight: bold;
      }
      .animated-btn {
        transition: all 1s cubic-bezier(0.2, 0, 0.1, 1);
        border-width: 2px;
        font-weight: 600;
        text-decoration: none;
        transform: translateZ(0);
      }
      .animated-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container-fluid pt-3">
      <div id="list"></div>
    </div>
    <script>
      const links = [];
      (async () => {
        const request = await fetch("apps.all.json");
        const apps = await request.json();
        const keys = Object.keys(apps);
        for (let i = 0; i < keys.length; i++) {
          const app = apps[keys[i]];
          const url = "https://meftuntech.github.io/app.html?id=" + app.appId;

          const { appIcon, appName, shortDescription, longDescription } = app;

          links.push({
            url,
            appIcon,
            appName,
            shortDescription: shortDescription.replace(/\n/g, "<br>"),
            longDescription: longDescription.replace(/\n/g, "<br>"),
          });
        }

        const list = document.querySelector("#list");
        const colors = [
          "primary",
          "success",
          "danger",
          "warning",
          "info",
          "light",
        ];
        let buttonsCreated = false;
        function createButtons() {
          list.innerHTML = "";
          links
            .sort(() => Math.random() - 0.5)
            .forEach((item, index) => {
              list.innerHTML += `
            <a
              href="${item.url}"
              target="_blank"
              class="btn btn-lg btn-outline-primary mb-5 w-100 animated-btn"
              id="btn-${index}"
            >
              <div class="w-100 d-flex justify-content-between align-items-center">
                <img
                  width="50"
                  style="border-radius: 50%;"
                  src="${item.appIcon}" 
                  alt=""
                />
                <span>${item.appName}</span>
              </div>
              <div class="mt-3 w-100" style="text-align: start; font-weight: normal !important; font-size: 0.90rem;">
                ${item.shortDescription}
                ${item.longDescription}
              </div>
            </a>
          `;
            });
          buttonsCreated = true;
        }
        function updateButtonColors() {
          if (!buttonsCreated) return;
          links.forEach((item, index) => {
            const button = document.getElementById(`btn-${index}`);
            if (button) {
              colors.forEach((color) => {
                button.classList.remove(`btn-outline-${color}`);
              });
              const randomColor =
                colors[Math.floor(Math.random() * colors.length)];
              button.classList.add(`btn-outline-${randomColor}`);
            }
          });
        }
        createButtons();
        setInterval(updateButtonColors, 1500);
      })();
    </script>
  </body>
</html>
